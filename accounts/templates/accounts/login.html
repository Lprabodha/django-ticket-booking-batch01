{% extends "base.html" %}

{% block title %} Login Page {% endblock%}

{% block content %}

<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-md">
            <h2 class="text-center text-2xl font-bold tracking-tight text-gray-900">Welcome Back</h2>
            <p class="mt-2 text-center text-sm text-gray-500">Login to continue online ticket booking journey.</p>
        </div>

        <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
            <div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-gray-200 sm:p-8">
                <form action="{% url 'login' %}" method="POST" class="space-y-5">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">

                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-900">Username</label>
                        <div class="mt-2">
                            <input type="text" name="username" id="username" required autocomplete="username"
                                placeholder="Enter your username"
                                class="block w-full rounded-md border-0 px-3 py-2 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-900">Password</label>
                        <div class="mt-2">
                            <input type="password" name="password" id="password" required autocomplete="current-password"
                                placeholder="Enter your password"
                                class="block w-full rounded-md border-0 px-3 py-2 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm">
                        </div>
                    </div>

                    {% if error %}
                    <div class="rounded-md border border-red-200 bg-red-50 p-3 text-sm text-red-700">
                        {{ error }}
                    </div>
                    {% endif %}

                    <button type="submit"
                        class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
                        Login
                    </button>
                </form>

                <p class="mt-6 text-center text-sm text-gray-500">
                    Don't have an account?
                    <a href="{% url 'register' %}" class="font-semibold text-indigo-600 hover:text-indigo-500">Register</a>
                </p>
            </div>
        </div>
    </div>

{% endblock %}

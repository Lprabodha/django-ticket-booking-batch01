<header class="sticky top-0 z-40 border-b border-gray-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex w-full max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a href="{% url 'index' %}" class="text-xl font-bold tracking-tight text-indigo-600">StarEvents</a>

        <nav aria-label="Primary Navigation" class="hidden items-center gap-8 text-sm font-medium text-gray-600 md:flex">
            <a href="{% url 'index' %}#categories" class="hover:text-indigo-600">Categories</a>
            <a href="{% url 'index' %}#latest-events" class="hover:text-indigo-600">Latest Events</a>
            <a href="{% url 'assistant' %}" class="hover:text-indigo-600">AI Assistant</a>
            <a href="" class="hover:text-indigo-600">Contact</a>
        </nav>

        <div class="flex items-center gap-2 sm:gap-3">
            {% if request.user.is_authenticated %}
            <a href="" class="hidden rounded-md px-3 py-2 text-sm font-semibold text-indigo-600 hover:bg-indigo-50 sm:inline-block">Help</a>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
                    Logout
                </button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" class="rounded-md px-3 py-2 text-sm font-semibold text-indigo-600 hover:bg-indigo-50">Login</a>
            <a href="{% url 'register' %}" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">Register</a>
            {% endif %}
        </div>
    </div>

    <nav aria-label="Mobile Navigation" class="border-t border-gray-100 bg-white px-4 py-2 md:hidden">
        <div class="mx-auto flex w-full max-w-7xl items-center gap-4 overflow-x-auto text-sm font-medium text-gray-600">
            <a href="{% url 'index' %}#categories" class="whitespace-nowrap rounded-md px-2 py-1 hover:bg-indigo-50 hover:text-indigo-600">Categories</a>
            <a href="{% url 'index' %}#latest-events" class="whitespace-nowrap rounded-md px-2 py-1 hover:bg-indigo-50 hover:text-indigo-600">Latest Events</a>
            <a href="{% url 'assistant' %}" class="hover:text-indigo-600">AI Assistant</a>
            <a href="" class="whitespace-nowrap rounded-md px-2 py-1 hover:bg-indigo-50 hover:text-indigo-600">Contact</a>
        </div>
    </nav>
</header>
